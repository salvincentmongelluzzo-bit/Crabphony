<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crabphony Mobile</title>
    
    <style>
        /* Reset & Mobile Base */
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #050505; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none; 
        }

        /* --- BOOT SCREENS --- */
        #loadingScreen, #mainMenu {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #mainMenu {
            background-image: url('background.gif'); background-size: cover; background-position: center bottom;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9); z-index: 50;
        }
        #menuLogo { width: 90%; max-width: 300px; margin-bottom: 30px; filter: drop-shadow(2px 2px 0px #0a141e) drop-shadow(0 0 15px rgba(77,166,255,0.5)); }
        .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: 80%; max-width: 280px; }
        
        /* Hide the Mobile button since we are already on mobile */
        #btnMobile { display: none !important; } 

        /* --- MOBILE GAME LAYER (Vertical Stack) --- */
        #gameLayer {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; 
        }

        /* 1. HUD (Top Bar) */
        #ui {
            width: 100%; background: rgba(10, 20, 30, 0.95);
            padding: 10px; box-sizing: border-box; border-bottom: 2px solid #4da6ff;
            display: flex; flex-wrap: wrap; justify-content: space-between;
            font-size: 13px; z-index: 10; font-weight: bold;
        }
        #ui p { margin: 4px 0; width: 48%; }
        #ui p:nth-child(1), #ui p:nth-child(2) { color: white; }

        /* 2. THE TANK (Middle Flex Area) */
        #gameCanvas {
            width: 100vw; flex-grow: 1; 
            background-image: url('background.gif'); background-size: cover; background-position: center bottom;
            display: block;
        }

        /* 3. MUTATION KEY (Horizontal Scroll immediately below tank) */
        #crabKey {
            display: flex; flex-wrap: nowrap; overflow-x: auto;
            background: #000; padding: 8px 10px; gap: 15px;
            border-top: 2px solid #4da6ff; border-bottom: 2px solid #4da6ff;
        }
        .key-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; min-width: 45px; }
        #crabKey::-webkit-scrollbar { height: 4px; }
        #crabKey::-webkit-scrollbar-thumb { background: #4da6ff; border-radius: 4px; }

        /* 4. SHOP & CONTROLS (Bottom Scrollable Sheet) */
        #shop {
            width: 100vw; height: 35vh; min-height: 250px;
            background: rgba(10, 20, 30, 0.98); 
            padding: 15px; box-sizing: border-box; overflow-y: auto; z-index: 10;
        }
        #sidebarLogo { display: none; } /* Hidden to save vertical space */
        
        #shop h2 { color: #4da6ff; font-size: 14px; margin: 15px 0 10px 0; border-bottom: 1px solid rgba(77,166,255,0.3); padding-bottom: 5px; text-transform: uppercase; }
        #shop h2:first-of-type { margin-top: 0; }

        /* Mobile Buttons */
        button {
            width: 100%; background: #0a141e; border: 1px solid #4da6ff; color: #4da6ff;
            padding: 14px; font-weight: bold; margin-bottom: 10px;
            border-radius: 6px; font-family: inherit; font-size: 13px;
        }
        button:active:not(:disabled) { background: #4da6ff; color: #050505; }
        button:disabled { border-color: #333; color: #555; background: #0a0a0a; }
        
        #btnPrestige { border-color: #ffcc00; color: #ffcc00; margin-top: 5px;}
        #btnPrestige:active:not(:disabled) { background: #ffcc00; color: #000; }
        
        #btnHardReset { border-color: #ff4d4d; color: #ff4d4d; }
        
        #harvestSelect { width: 100%; padding: 12px; background: #000; color: #4da6ff; border: 1px solid #4da6ff; margin-bottom: 10px; font-weight: bold; border-radius: 6px; font-family: inherit; font-size: 14px;}

        /* Loading animations */
        #loadingCrab { width: 70px; image-rendering: pixelated; margin-bottom: 20px; animation: loadingRainbow 2s linear infinite; }
        @keyframes loadingRainbow { 0% { filter: hue-rotate(0deg) saturate(3); } 100% { filter: hue-rotate(360deg) saturate(3); } }
        .loader-bar { width: 200px; height: 8px; border: 2px solid #ffffff; border-radius: 4px; overflow: hidden; }
        .loader-fill { height: 100%; width: 0%; background-color: #ffffff; animation: fillBar 1.5s ease-in-out forwards; }
        @keyframes fillBar { to { width: 100%; } }
        
        .mobile-footer { text-align: center; margin-top: 25px; padding-bottom: 20px; }
        .mobile-footer a { color: #888; text-decoration: underline; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loadingScreen">
        <img src="crab.png" id="loadingCrab" alt="Loading Crab">
        <div class="loader-bar">
            <div class="loader-fill"></div>
        </div>
    </div>

    <div id="mainMenu" style="display: none;">
        <img src="crabphony.png" id="menuLogo" alt="Crabphony">
        <div class="menu-buttons">
            <button id="btnNewGame">NEW GAME</button>
            <button id="btnContinueGame">CONTINUE</button>
            <button id="btnMobile">CRABPHONY MOBILE</button>
            <button id="btnHowToPlay">HOW TO PLAY</button>
            <button id="btnAboutUs">ABOUT US</button>
        </div>
    </div>

    <div id="gameLayer" style="display: none;">
        
        <div id="ui">
            <p>Points: <span id="scoreDisplay">0.0</span></p>
            <p style="text-align: right;">Pop: <span id="popDisplay">2</span> / <span id="maxPopDisplay">10</span></p>
            <p style="color: #ffcc00;">Multiplier: x<span id="multiplierDisplay">1.0</span></p>
            <p style="color: #ffcc00; text-align: right;">Barnacles: <span id="barnacleDisplay">0</span></p>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="crabKey"></div>

        <div id="shop">
            <img src="crabphony.png" id="sidebarLogo" alt="Crabphony">
            
            <h2>Upgrades & Management</h2>
            <button id="btnBuyCapacity">Expand Tank (+5) - Cost: <span id="costCapacity">100</span></button>
            <button id="btnBuyBlueCrab">Import Blue Crab - Cost: <span id="costBlueCrab">50</span></button>
            <button id="btnBuyAutoFeeder">Auto-Feeder (Lvl <span id="lvlFeeder">0</span>) - Cost: <span id="costFeeder">200</span></button>
            <button id="btnBuyMutation">Genetics (Lvl <span id="lvlMutation">0</span>) - Cost: <span id="costMutation">500</span></button>
            
            <h2>Harvester</h2>
            <select id="harvestSelect"></select>
            <button id="btnHarvest">Harvest Selected (+<span id="harvestYield">0</span> pts)</button>
            
            <h2 style="color: #ffcc00;">Evolution</h2>
            <button id="btnPrestige">CARCINIZE (100,000 Pts)</button>

            <div style="margin-top: 30px; border-top: 1px solid #ff4d4d; padding-top: 15px;">
                <p style="color: #ff4d4d; font-size: 11px; margin-bottom: 8px; text-align: center;">WARNING: THIS WIPES EVERYTHING</p>
                <button id="btnHardReset">ERASE ALL DATA</button>
            </div>
            
            <div class="mobile-footer">
                <a href="index.html">Return to Desktop Version</a>
            </div>
        </div>
        
    </div>
    
    <script src="game.js"></script>
    
    <script>
        document.getElementById('gameCanvas').addEventListener('touchstart', function(e) {
            e.preventDefault(); // Stops the screen from scrolling when you tap
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent("mousedown", {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            this.dispatchEvent(mouseEvent);
        }, {passive: false});
    </script>
</body>
</html>
